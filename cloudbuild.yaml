# ─────────────────────────────────────────────────────────────────────────────
# Google Cloud Build CI/CD Pipeline
# Carbon Footprint Awareness Platform
#
# Trigger: Push to `main` branch
# Pipeline stages:
#   1. Install dependencies (backend + frontend)
#   2. Run backend unit tests
#   3. Run frontend unit tests with coverage
#   4. Build frontend production bundle
#   5. Build multi-stage Docker image
#   6. Push image to Artifact Registry
#   7. Deploy to Cloud Run (production)
#   8. Run smoke tests against deployed URL
#
# Required Cloud Build substitutions (set in trigger config):
#   _REGION          : Deployment region (e.g. us-central1)
#   _SERVICE_NAME    : Cloud Run service name (e.g. ecotrack-api)
#   _AR_REPO         : Artifact Registry repo (e.g. ecotrack)
#   _MIN_INSTANCES   : Min instances (e.g. 0)
#   _MAX_INSTANCES   : Max instances (e.g. 10)
#   _MEMORY          : Container memory (e.g. 512Mi)
#   _CPU             : Container CPU (e.g. 1)
#
# Required Secret Manager secrets (referenced below):
#   projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
#   projects/$PROJECT_ID/secrets/GOOGLE_MAPS_API_KEY/versions/latest
#   projects/$PROJECT_ID/secrets/FIREBASE_PROJECT_ID/versions/latest
#   projects/$PROJECT_ID/secrets/FIREBASE_CLIENT_EMAIL/versions/latest
#   projects/$PROJECT_ID/secrets/FIREBASE_PRIVATE_KEY/versions/latest
#
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION:        'us-central1'
  _SERVICE_NAME:  'ecotrack-api'
  _AR_REPO:       'ecotrack'
  _MIN_INSTANCES: '0'
  _MAX_INSTANCES: '10'
  _MEMORY:        '512Mi'
  _CPU:           '1'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  dynamic_substitutions: true

timeout: '1200s'  # 20 minutes max

steps:
  # ── Stage 1A: Install backend dependencies ──────────────────────────────────
  - id: 'install-backend'
    name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['ci', '--prefer-offline']
    dir: 'backend'
    env:
      - 'NODE_ENV=test'

  # ── Stage 1B: Install frontend dependencies ─────────────────────────────────
  - id: 'install-frontend'
    name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['ci', '--prefer-offline']
    dir: 'frontend'
    env:
      - 'NODE_ENV=test'

  # ── Stage 2: Backend unit tests ─────────────────────────────────────────────
  - id: 'test-backend'
    name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['test']
    dir: 'backend'
    env:
      - 'NODE_ENV=test'
      - 'STUB_MODE=true'
      - 'GOOGLE_MAPS_API_KEY=stub'
      - 'GEMINI_API_KEY=stub'
      - 'FIREBASE_PROJECT_ID=test-project'
      - 'FIREBASE_CLIENT_EMAIL=test@test.iam.gserviceaccount.com'
      - 'FIREBASE_PRIVATE_KEY=stub-key'
      - 'ALLOWED_ORIGINS=http://localhost:5173'
    waitFor: ['install-backend']

  # ── Stage 3: Frontend unit tests with coverage ──────────────────────────────
  - id: 'test-frontend'
    name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['run', 'test:coverage']
    dir: 'frontend'
    env:
      - 'NODE_ENV=test'
      - 'VITE_API_BASE_URL=http://localhost:8080'
      - 'VITE_FIREBASE_API_KEY=test'
      - 'VITE_FIREBASE_AUTH_DOMAIN=test.firebaseapp.com'
      - 'VITE_FIREBASE_PROJECT_ID=test-project'
      - 'VITE_FIREBASE_STORAGE_BUCKET=test.appspot.com'
      - 'VITE_FIREBASE_MESSAGING_SENDER_ID=123'
      - 'VITE_FIREBASE_APP_ID=1:123:web:abc'
      - 'VITE_GOOGLE_MAPS_API_KEY=stub'
    waitFor: ['install-frontend']

  # ── Stage 4: Build frontend production bundle ────────────────────────────────
  - id: 'build-frontend'
    name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['run', 'build']
    dir: 'frontend'
    env:
      - 'NODE_ENV=production'
      - 'VITE_API_BASE_URL=https://$_SERVICE_NAME-$PROJECT_NUMBER.$_REGION.run.app'
      - 'VITE_FIREBASE_API_KEY=$$VITE_FIREBASE_API_KEY'
      - 'VITE_FIREBASE_AUTH_DOMAIN=$$VITE_FIREBASE_AUTH_DOMAIN'
      - 'VITE_FIREBASE_PROJECT_ID=$$VITE_FIREBASE_PROJECT_ID'
      - 'VITE_FIREBASE_STORAGE_BUCKET=$$VITE_FIREBASE_STORAGE_BUCKET'
      - 'VITE_FIREBASE_MESSAGING_SENDER_ID=$$VITE_FIREBASE_MESSAGING_SENDER_ID'
      - 'VITE_FIREBASE_APP_ID=$$VITE_FIREBASE_APP_ID'
      - 'VITE_GOOGLE_MAPS_API_KEY=$$VITE_GOOGLE_MAPS_API_KEY'
    secretEnv:
      - 'VITE_FIREBASE_API_KEY'
      - 'VITE_FIREBASE_AUTH_DOMAIN'
      - 'VITE_FIREBASE_PROJECT_ID'
      - 'VITE_FIREBASE_STORAGE_BUCKET'
      - 'VITE_FIREBASE_MESSAGING_SENDER_ID'
      - 'VITE_FIREBASE_APP_ID'
      - 'VITE_GOOGLE_MAPS_API_KEY'
    waitFor: ['test-frontend']

  # ── Stage 5: Build Docker image (multi-stage) ────────────────────────────────
  - id: 'docker-build'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--tag'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:$COMMIT_SHA'
      - '--tag'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:latest'
      - '--cache-from'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:latest'
      - '--build-arg'
      - 'BUILDKIT_INLINE_CACHE=1'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'
    waitFor: ['build-frontend', 'test-backend']

  # ── Stage 6: Push image to Artifact Registry ────────────────────────────────
  - id: 'docker-push'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME'
    waitFor: ['docker-build']

  # ── Stage 7: Deploy to Cloud Run ─────────────────────────────────────────────
  - id: 'deploy-cloud-run'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '$_MIN_INSTANCES'
      - '--max-instances'
      - '$_MAX_INSTANCES'
      - '--memory'
      - '$_MEMORY'
      - '--cpu'
      - '$_CPU'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '30'
      - '--set-secrets'
      - >-
        GEMINI_API_KEY=GEMINI_API_KEY:latest,
        GOOGLE_MAPS_API_KEY=GOOGLE_MAPS_API_KEY:latest,
        FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,
        FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,
        FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest
      - '--set-env-vars'
      - 'NODE_ENV=production,STUB_MODE=false'
      - '--labels'
      - 'commit-sha=$COMMIT_SHA,build-id=$BUILD_ID,managed-by=cloud-build'
    waitFor: ['docker-push']

  # ── Stage 8: Smoke test — verify deployment health ──────────────────────────
  - id: 'smoke-test'
    name: 'curlimages/curl:latest'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        SERVICE_URL=$(gcloud run services describe $_SERVICE_NAME \
          --region=$_REGION \
          --format='value(status.url)' 2>/dev/null || echo "")
        if [ -z "$SERVICE_URL" ]; then
          echo "❌ Could not retrieve service URL"
          exit 1
        fi
        echo "🔍 Smoke testing: $SERVICE_URL/api/health"
        RESPONSE=$(curl -sf --max-time 15 "$SERVICE_URL/api/health")
        STATUS=$(echo "$RESPONSE" | grep -o '"status":"ok"' | head -1)
        if [ "$STATUS" = '"status":"ok"' ]; then
          echo "✅ Smoke test passed — service is healthy"
        else
          echo "❌ Smoke test failed — unexpected response: $RESPONSE"
          exit 1
        fi
    waitFor: ['deploy-cloud-run']

# ── Artifact Registry image output ──────────────────────────────────────────
images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:$COMMIT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:latest'

# ── Secret Manager references ────────────────────────────────────────────────
availableSecrets:
  secretManager:
    - versionName: 'projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest'
      env: 'GEMINI_API_KEY'
    - versionName: 'projects/$PROJECT_ID/secrets/GOOGLE_MAPS_API_KEY/versions/latest'
      env: 'GOOGLE_MAPS_API_KEY'
    - versionName: 'projects/$PROJECT_ID/secrets/FIREBASE_PROJECT_ID/versions/latest'
      env: 'FIREBASE_PROJECT_ID'
    - versionName: 'projects/$PROJECT_ID/secrets/FIREBASE_CLIENT_EMAIL/versions/latest'
      env: 'FIREBASE_CLIENT_EMAIL'
    - versionName: 'projects/$PROJECT_ID/secrets/FIREBASE_PRIVATE_KEY/versions/latest'
      env: 'FIREBASE_PRIVATE_KEY'
    - versionName: 'projects/$PROJECT_ID/secrets/VITE_FIREBASE_API_KEY/versions/latest'
      env: 'VITE_FIREBASE_API_KEY'
    - versionName: 'projects/$PROJECT_ID/secrets/VITE_FIREBASE_AUTH_DOMAIN/versions/latest'
      env: 'VITE_FIREBASE_AUTH_DOMAIN'
    - versionName: 'projects/$PROJECT_ID/secrets/VITE_FIREBASE_PROJECT_ID/versions/latest'
      env: 'VITE_FIREBASE_PROJECT_ID'
    - versionName: 'projects/$PROJECT_ID/secrets/VITE_FIREBASE_STORAGE_BUCKET/versions/latest'
      env: 'VITE_FIREBASE_STORAGE_BUCKET'
    - versionName: 'projects/$PROJECT_ID/secrets/VITE_FIREBASE_MESSAGING_SENDER_ID/versions/latest'
      env: 'VITE_FIREBASE_MESSAGING_SENDER_ID'
    - versionName: 'projects/$PROJECT_ID/secrets/VITE_FIREBASE_APP_ID/versions/latest'
      env: 'VITE_FIREBASE_APP_ID'
    - versionName: 'projects/$PROJECT_ID/secrets/VITE_GOOGLE_MAPS_API_KEY/versions/latest'
      env: 'VITE_GOOGLE_MAPS_API_KEY'
